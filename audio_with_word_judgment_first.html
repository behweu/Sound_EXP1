<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>My experiment</title>

  <!-- jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <!-- Proliferate -->
  <script src="https://proliferate.alps.science/static/js/proliferate.js" type="text/javascript"></script>

  <!-- jsPsych -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="jspsych/plugin-fullscreen.js"></script>
  <script src="jspsych/plugin-survey-text.js"></script>

  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />

  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .trial-container {
      width: 900px;
      margin: auto;
      text-align: center;
      line-height: 1.6;
    }

    .audio-container {
      margin-bottom: 35px;
    }

    .audio-container audio {
      width: 500px;
    }

    .image-row {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-bottom: 20px;
    }

    .image-box {
      width: 300px;
      text-align: center;
    }

    .choice-image {
      max-width: 300px;
      max-height: 300px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 6px;
      background: white;
    }

    .jspsych-html-button-response-btngroup {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 10px;
    }

    .jspsych-html-button-response-button {
      width: 300px;
      text-align: center;
    }

    .jspsych-btn {
      min-width: 160px;
      font-size: 16px;
      padding: 8px 18px;
    }

    .word-trial-container {
      width: 700px;
      margin: auto;
      text-align: center;
      line-height: 1.6;
    }

    .word-stimulus {
      font-size: 42px;
      font-weight: 600;
      margin: 45px 0 30px 0;
      letter-spacing: 1px;
    }
  </style>
</head>

<body></body>

<script>

  // =========================
  // Word judgment stimuli
  // =========================

  var word_stimuli = [
    { item_id: "0a", word: "platery" }
  ];


  // =========================
  // Audio-image stimuli
  // =========================

  var stimuli = [];

  const total_audio_trials = 3;

  for (let i = 1; i <= total_audio_trials; i++) {

    stimuli.push({
      audio: `audio/${String(i).padStart(2, '0')}.mp3`,
      left_image: `images/l${i}.PNG`,
      right_image: `images/r${i}.PNG`
    });

  }


  // =========================
  // Total trials
  // =========================

  var n_trials = word_stimuli.length + stimuli.length;


  // =========================
  // Initialize jsPsych
  // =========================

  var jsPsych = initJsPsych({

    show_progress_bar: true,
    auto_update_progress_bar: false,

    on_finish: function(data) {

      var vals = data.values();

      if (vals.length > n_trials) {

        proliferate.submit({
          "trials": data.values()
        });

      }
    }
  });


  // =========================
  // Timeline
  // =========================

  var timeline = [];


  // =========================
  // Instructions
  // =========================

  var instructions = {

    type: jsPsychHtmlButtonResponse,

    stimulus:

      '<div style="text-align:left; width:700px; margin:auto; line-height:1.8;">' +

      '<p>测试包含<strong>两个部分</strong>，共需要约<strong>3–5 分钟</strong>。</p>' +

      '<p>第一部分的每一题中，您会看到一个由字母组成的字符串。</p>' +

      '<p>您的任务是判断它<strong>是否是一个真实存在的英文单词</strong>。</p>' +

      '<p>比如 “denial” 就是一个真实存在的英文单词，而 “proom” 就是一个编造的单词。</p>' +

      '<p>如果您确定这个单词存在，即使您不知道它的准确含义，也仍然可以选择“是”。但如果您不确定它是否是一个真实存在的单词，请选择“否”。</p>' +

      '<p>在本实验中，使用的是英式英语拼写，而不是美式英语拼写。例如：“realise” 而不是 “realize”，“colour” 而不是 “color”等等。不过，请不要因此感到困惑，因为本实验并不关注这些细微的拼写差异。</p>' +

      '<p><strong>注意：实验过程中不要借助字典或其他工具进行辅助。</strong></p>' +

      '<p>如果您已经理解以上说明，现在可以开始测试。</p>' +

      '</div>',

    choices: ['开始'],

    button_html:
      '<button class="jspsych-btn" style="margin-top:20px;">%choice%</button>'
  };

  timeline.push(instructions);


  // =========================
  // Shuffle function
  // =========================

  function shuffle(array) {

    for (let i = array.length - 1; i > 0; i--) {

      const j = Math.floor(Math.random() * (i + 1));

      [array[i], array[j]] = [array[j], array[i]];
    }

    return array;
  }


  word_stimuli = shuffle(word_stimuli);
  stimuli = shuffle(stimuli);


  // =========================
  // Preload
  // =========================

  var audio_files = [];
  var image_files = [];

  stimuli.forEach(function(item) {

    audio_files.push(item.audio);

    image_files.push(item.left_image);
    image_files.push(item.right_image);

  });

  var preload = {

    type: jsPsychPreload,

    audio: audio_files,
    images: image_files
  };

  timeline.push(preload);


  // =========================
  // Word judgment trial
  // =========================

  function createWordJudgmentTrial(item, index) {

    return {

      type: jsPsychHtmlButtonResponse,

      stimulus:

        '<div class="word-trial-container">' +

        '<p style="font-size:18px; margin-bottom:12px;">这个是真实存在的英文单词吗？</p>' +

        '<div class="word-stimulus">' +
        item.word +
        '</div>' +

        '</div>',

      choices: ['是', '否'],

      button_html:
        '<button class="jspsych-btn">%choice%</button>',

      data: {

        trial_type: 'word_judgment',

        item_index: index,
        item_id: item.item_id,
        word: item.word
      },

      on_finish: function(data) {

        if (data.response === 0) {

          data.selected_response = 'yes';
          data.selected_label = '是';

        } else if (data.response === 1) {

          data.selected_response = 'no';
          data.selected_label = '否';
        }

        var curr = jsPsych.getProgressBarCompleted();

        jsPsych.setProgressBar(
          curr + (1 / n_trials)
        );
      }
    };
  }


  // Add word trials

  word_stimuli.forEach(function(item, idx) {

    timeline.push(
      createWordJudgmentTrial(item, idx)
    );

  });


  // =========================
  // Audio-image trial
  // =========================

  function createAudioImageTrial(item, index) {

    return {

      type: jsPsychHtmlButtonResponse,

      stimulus:

        '<div class="trial-container">' +

        '<div class="audio-container">' +

        '<p style="font-size:18px; margin-bottom:12px;">请选择与音频最匹配的图片</p>' +

        '<audio controls>' +

        '<source src="' + item.audio + '">' +

        'Your browser does not support the audio element.' +

        '</audio>' +

        '</div>' +

        '<div class="image-row">' +

        '<div class="image-box">' +

        '<img class="choice-image" src="' + item.left_image + '">' +

        '</div>' +

        '<div class="image-box">' +

        '<img class="choice-image" src="' + item.right_image + '">' +

        '</div>' +

        '</div>' +

        '</div>',

      choices: ['左图', '右图'],

      button_html:
        '<button class="jspsych-btn">%choice%</button>',

      data: {

        trial_type: 'audio_image_choice',

        item_index: index,

        audio: item.audio,

        left_image: item.left_image,
        right_image: item.right_image
      },

      on_finish: function(data) {

        if (data.response === 0) {

          data.selected_side = 'left';
          data.selected_label = '左图';
          data.selected_image = item.left_image;

        } else if (data.response === 1) {

          data.selected_side = 'right';
          data.selected_label = '右图';
          data.selected_image = item.right_image;
        }

        var curr = jsPsych.getProgressBarCompleted();

        jsPsych.setProgressBar(
          curr + (1 / n_trials)
        );
      }
    };
  }


  // Add audio-image trials

  stimuli.forEach(function(item, idx) {

    timeline.push(
      createAudioImageTrial(item, idx)
    );

  });


  // =========================
  // Feedback page
  // =========================

  var survey = {

    type: jsPsychSurveyText,

    questions: [

      {
        prompt:

          '<p>如果你在实验过程中遇到了问题，或者有任何想要反馈的感受，</p>' +

          '<p>欢迎分享在以下的文字框中：</p>',

        rows: 5
      }
    ]
  };

  timeline.push(survey);


  // =========================
  // End page
  // =========================

  var end_of_experiment = {

    type: jsPsychHtmlButtonResponse,

    stimulus:

      '<p>谢谢您的参与！</p>' +

      '<p>点击下面按钮提交并结束实验。</p>',

    choices: ['提交并结束'],

    button_html:

      '<button class="jspsych-btn" style="margin-top:20px;">%choice%</button>'
  };

  timeline.push(end_of_experiment);


  // =========================
  // Exit fullscreen
  // =========================

  var exit_fullscreen = {

    type: jsPsychFullscreen,

    fullscreen_mode: false
  };

  timeline.push(exit_fullscreen);


  // =========================
  // Run experiment
  // =========================

  jsPsych.run(timeline);

</script>

</html>
